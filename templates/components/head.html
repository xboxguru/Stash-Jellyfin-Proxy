<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #252540;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #4a90d9;
            --accent-hover: #5da0e9;
            --success: #4caf50;
            --warning: #ff9800;
            --error: #f44336;
            --border: #3a3a5a;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--bg-secondary); padding: 20px 0; border-right: 1px solid var(--border); }
        .logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .logo h1 { font-size: 16px; color: var(--accent); }
        .logo span { font-size: 12px; color: var(--text-secondary); }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; color: var(--text-secondary); text-decoration: none; cursor: pointer; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--bg-card); color: var(--text-primary); }
        .nav-item.active { border-left: 3px solid var(--accent); }
        .nav-item svg { width: 20px; height: 20px; margin-right: 12px; }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .page-title { font-size: 24px; margin-bottom: 24px; }
        .card { background: var(--bg-card); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .status-card { background: var(--bg-card); border-radius: 8px; padding: 20px; }
        .status-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .status-value { font-size: 24px; font-weight: 600; }
        .status-value.running { color: var(--success); }
        .status-value.stopped { color: var(--error); }
        .status-value.connected { color: var(--success); }
        .status-value.disconnected { color: var(--error); }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 14px; }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .form-hint, .status-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .env-locked { border-color: #b35900 !important; background: rgba(179, 89, 0, 0.15) !important; color: #ff9933 !important; cursor: not-allowed; }
        .env-locked:disabled { opacity: 0.8; }
        .env-locked-label { color: #ff9933 !important; cursor: not-allowed; opacity: 0.8; }
        .env-locked-label::after { content: ' (env)'; font-size: 11px; color: #b35900; }
        .env-notice { background: rgba(179, 89, 0, 0.15); border: 1px solid #b35900; border-radius: 6px; padding: 12px 16px; margin-top: 16px; color: #ff9933; font-size: 13px; display: none; }
        .env-notice strong { color: #ffb366; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .form-row.three-col { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; background: rgba(0,0,0,0.15); padding: 16px; border-radius: 6px; margin-bottom: 16px; }
        .badge-warning { background: rgba(255, 152, 0, 0.15); color: var(--warning); padding: 3px 8px; border-radius: 4px; font-size: 10px; margin-left: 8px; vertical-align: middle; text-transform: none; letter-spacing: normal; }
        .toggle-row { display: flex; align-items: center; gap: 14px; padding: 4px 0; }
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: background 0.2s; }
        .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
        .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
        .toggle-label { font-size: 14px; color: var(--text-primary); font-weight: 500; }
        .toggle-hint { font-size: 12px; color: var(--text-secondary); }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
        .log-viewer { background: var(--bg-secondary); border-radius: 6px; padding: 16px; font-family: 'Monaco', 'Menlo', monospace; font-size: 12px; line-height: 1.6; max-height: 400px; overflow-y: auto; }
        .log-entry { padding: 2px 0; white-space: pre-wrap; word-break: break-all; }
        .log-DEBUG { color: #888; }
        .log-INFO { color: var(--text-primary); }
        .log-WARNING { color: var(--warning); }
        .log-ERROR { color: var(--error); }
        .log-NOTICE { color: #4a90d9; font-weight: bold; } /* Nice Blue */
        .log-TRACE { color: #888888; font-style: italic; } /* Dimmed Grey */
        .log-controls { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
        .log-filter { padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 14px; }
        .log-count { margin-left: auto; color: var(--text-secondary); font-size: 14px; }
        .streams-list { background: var(--bg-secondary); border-radius: 6px; padding: 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 12px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; padding: 12px 8px; background: var(--bg-secondary); border-radius: 6px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 600; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }
        .top-played-list { background: var(--bg-secondary); border-radius: 6px; padding: 12px; }
        .top-played-item { display: flex; align-items: center; padding: 10px 12px; background: var(--bg-card); border-radius: 6px; margin-bottom: 8px; transition: background 0.2s; }
        .top-played-item:hover { background: var(--bg-secondary); }
        .top-played-item:last-child { margin-bottom: 0; }
        .top-played-rank { font-size: 1.25rem; font-weight: 700; color: var(--accent); width: 30px; text-align: center; }
        .top-played-info { flex: 1; margin-left: 12px; overflow: hidden; }
        .top-played-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .top-played-performer { font-size: 0.85rem; color: var(--text-secondary); }
        .top-played-count { font-weight: 600; color: var(--accent); margin-left: 12px; }
        .tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .tab-btn { background: transparent; border: none; color: var(--text-secondary); padding: 6px 12px; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
        .tab-btn:hover { background: var(--bg-secondary); }
        .tab-btn.active { background: var(--accent); color: white; }
        .stream-item { display: flex; flex-direction: row; align-items: center; padding: 12px; background: var(--bg-card); border-radius: 6px; margin-bottom: 8px; }
        .stream-thumb { height: 54px; width: 96px; object-fit: cover; border-radius: 4px; background: var(--bg-secondary); flex-shrink: 0; }
        .stream-details { display: flex; flex-direction: column; flex: 1; margin: 0 16px; overflow: hidden; }
        .stream-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stream-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .stream-meta-item { display: flex; align-items: center; gap: 4px; }
        .stream-meta-item svg { width: 14px; height: 14px; }
        .stream-time { color: var(--text-secondary); font-size: 13px; font-weight: 500; white-space: nowrap; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; color: white; font-size: 14px; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        .toast.warning { background: var(--warning); }
        .toast.info { background: var(--accent); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .hidden { display: none; }
        select.form-input { cursor: pointer; }
        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; display: flex; flex-wrap: wrap; padding: 10px; border-right: none; border-bottom: 1px solid var(--border); }
            .logo { width: 100%; border-bottom: none; margin-bottom: 0; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
            .nav-item { flex: 1; justify-content: center; padding: 10px; font-size: 12px; }
            .nav-item svg { margin-right: 6px; }
            .nav-item[onclick="doLogout()"] { margin-top: 0 !important; }
            .delete-action-container { opacity: 1; }
        }
        /* Resource Monitor Styles */
        .resource-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 10px; }
        .res-card { background: rgba(0, 0, 0, 0.2); padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .res-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .res-val { font-weight: bold; color: var(--text-primary); }
        .res-bar-bg { background: rgba(255, 255, 255, 0.1); height: 6px; border-radius: 3px; overflow: hidden; position: relative; }
        .res-bar-fill { height: 100%; transition: width 0.5s ease-out, background-color 0.3s; }
        .res-proxy-color { background-color: var(--primary); }
        .res-sys-color { background-color: #10b981; } /* Emerald Green */
        .res-disk-color { background-color: #f59e0b; } /* Amber */
        .collapse-icon { transition: transform 0.3s ease; cursor: pointer; }
        .collapsed .collapse-icon { transform: rotate(-90deg); }
        .collapsible-content { overflow: hidden; transition: max-height 0.3s ease-out; max-height: 500px; }
        .collapsible-content.hidden { max-height: 0; padding: 0; border: none; opacity: 0; }

        /* ── TV Guide — two-panel layout ──────────────────────────────────── */
        .guide-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .guide-nav-btn { padding: 7px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: background 0.2s; }
        .guide-nav-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
        .guide-nav-btn.guide-now-btn { background: var(--accent); color: white; border-color: var(--accent); }
        .guide-nav-btn.guide-now-btn:hover { background: var(--accent-hover); }
        .guide-date-label { font-size: 15px; font-weight: 600; flex: 1; text-align: center; }
        /* Outer container: flex row, fixed height, no overflow (overflow lives in the two panels) */
        .guide-wrapper { display: flex; height: calc(100vh - 230px); min-height: 300px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg-primary); }
        /* Left panel: channel column — only the right panel scrolls horizontally */
        .guide-left { width: 160px; flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .guide-corner { height: 36px; flex-shrink: 0; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
        .guide-channel-cell { height: 80px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 6px; background: var(--bg-card); border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; overflow: hidden; }
        .guide-channel-cell:hover { background: var(--bg-secondary); }
        .guide-ch-logo { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; background: var(--bg-primary); flex-shrink: 0; }
        .guide-ch-logo-placeholder { width: 40px; height: 40px; border-radius: 4px; background: var(--bg-secondary); border: 1px dashed var(--border); flex-shrink: 0; }
        .guide-ch-number { font-size: 9px; font-weight: 600; color: var(--accent); text-align: center; line-height: 1; flex-shrink: 0; }
        .guide-ch-name { font-size: 11px; color: var(--text-secondary); text-align: center; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .guide-ch-edit-hint { font-size: 10px; color: var(--accent); opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
        .guide-channel-cell:hover .guide-ch-edit-hint { opacity: 1; }
        .guide-channel-readonly { cursor: default; }
        .guide-channel-readonly:hover { background: var(--bg-card); }
        .guide-ch-ext-badge { font-size: 9px; color: var(--text-secondary); background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 3px; padding: 1px 4px; flex-shrink: 0; }
        /* Right panel: ruler + programs — scrolls both directions */
        .guide-right { flex: 1; overflow: auto; min-width: 0; }
        .guide-ruler { position: sticky; top: 0; z-index: 10; height: 36px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
        .guide-hour-label { position: absolute; top: 0; height: 100%; display: flex; align-items: center; padding-left: 6px; font-size: 11px; color: var(--text-secondary); border-left: 1px solid var(--border); white-space: nowrap; pointer-events: none; box-sizing: border-box; }
        .guide-programs-row { position: relative; height: 80px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .guide-programs-row:last-child { border-bottom: none; }
        .guide-program { position: absolute; top: 4px; bottom: 4px; border-radius: 4px; background: var(--bg-card); border: 1px solid var(--border); overflow: hidden; padding: 4px 6px; transition: border-color 0.15s, background 0.15s; box-sizing: border-box; }
        .guide-program:hover { border-color: var(--accent); z-index: 5; }
        .guide-program[data-scene] { cursor: pointer; }
        .guide-program[data-scene]:hover { background: rgba(74,144,217,0.12); }
        .guide-program-live { background: rgba(74, 144, 217, 0.18); border-color: var(--accent); }
        .gp-movie       { background: rgba(90,60,180,0.25);  border-color: #7a5cd8; }
        .gp-kids        { background: rgba(0,180,200,0.25);  border-color: #00b4c8; }
        .gp-sports      { background: rgba(40,160,60,0.25);  border-color: #28a03c; }
        .gp-comedy      { background: rgba(200,180,0,0.25);  border-color: #c8b400; }
        .gp-documentary { background: rgba(0,150,130,0.25);  border-color: #009682; }
        .gp-talk        { background: rgba(180,60,140,0.25); border-color: #b43c8c; }
        .gp-music       { background: rgba(200,100,20,0.25); border-color: #c86414; }
        .gp-news        { background: rgba(200,50,40,0.25);  border-color: #c83228; }
        .guide-program-title { display: block; font-size: 11px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
        .guide-now-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); z-index: 5; pointer-events: none; }

        /* ── Guide edit mode ──────────────────────────────────────────────── */
        .guide-edit-btn { font-size: 12px; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; transition: background 0.15s, color 0.15s; }
        .guide-edit-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        /* delete button overlaid on each program block — fades in on parent hover */
        .guide-prog-delete { display: none; position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; font-size: 11px; line-height: 16px; text-align: center; border-radius: 50%; background: rgba(200,50,40,0.85); color: #fff; cursor: pointer; z-index: 8; border: none; padding: 0; opacity: 0; transition: opacity 0.15s; }
        /* drag handle */
        .guide-prog-drag { display: none; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; font-size: 10px; line-height: 14px; text-align: center; color: var(--text-secondary); cursor: grab; z-index: 8; user-select: none; }
        /* show controls when guide is in edit mode */
        .guide-edit-active .guide-prog-delete { display: block; }
        .guide-edit-active .guide-prog-drag   { display: block; }
        /* X fades in when hovering the program block */
        .guide-edit-active .guide-program:hover .guide-prog-delete { opacity: 1; }
        /* drag-over highlight and drag state */
        .guide-program.drag-over { outline: 2px solid var(--accent); outline-offset: -2px; }
        .guide-program.dragging  { opacity: 0.3; pointer-events: none; }
        /* smooth left-shift during drag operations */
        .guide-drag-active .guide-program:not(.dragging) { transition: left 0.1s ease; }
        /* insert zone — thin strip between programs, expands on hover (only shown in edit mode) */
        .guide-insert-zone { display: none; position: absolute; top: 4px; bottom: 4px; width: 6px; transform: translateX(-3px); z-index: 9; cursor: pointer; align-items: center; justify-content: center; transition: width 0.15s, transform 0.15s, background 0.15s; border-radius: 4px; }
        .guide-edit-active .guide-insert-zone { display: flex; }
        .guide-insert-zone:hover { width: 30px; transform: translateX(-15px); background: rgba(74,200,120,0.25); border: 1px dashed #4ac878; }
        .guide-program-past { opacity: 0.5; }
        .guide-insert-icon { opacity: 0; font-size: 15px; color: #4ac878; font-weight: bold; line-height: 1; transition: opacity 0.15s; pointer-events: none; }
        .guide-insert-zone:hover .guide-insert-icon { opacity: 1; }

        /* ── Scene picker modal ───────────────────────────────────────────── */
        .picker-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,15,26,0.92); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(4px); padding: 20px; box-sizing: border-box; }
        .picker-modal-overlay.open { display: flex; }
        .picker-modal-card { background: var(--bg-card); border-radius: 10px; width: 100%; max-width: 820px; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .picker-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .picker-modal-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .picker-modal-close { background: none; border: none; font-size: 20px; color: var(--text-secondary); cursor: pointer; line-height: 1; }
        .picker-filters { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .picker-filter-input { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary); font-size: 12px; padding: 5px 8px; }
        .picker-filter-input:focus { outline: none; border-color: var(--accent); }
        .picker-filter-check { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); cursor: pointer; }
        .picker-filter-check input { cursor: pointer; }
        .picker-scene-list { overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
        .picker-scene-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-secondary); cursor: pointer; transition: border-color 0.15s, background 0.15s; }
        .picker-scene-item:hover { border-color: var(--accent); background: rgba(74,144,217,0.08); }
        .picker-scene-thumb { width: 64px; height: 36px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: var(--bg-card); }
        .picker-scene-info { flex: 1; min-width: 0; }
        .picker-scene-title { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .picker-scene-meta  { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .picker-scene-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-right: 4px; }
        .picker-badge-org  { background: rgba(90,60,180,0.3); color: #a88af0; }
        .picker-badge-enj  { background: rgba(74,200,120,0.2); color: #4ac878; }
        .picker-badge-genre { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
        .picker-thumb-placeholder { width: 64px; height: 36px; flex-shrink: 0; background: var(--bg-card); border-radius: 3px; }
        .picker-empty { text-align: center; color: var(--text-secondary); font-size: 13px; padding: 30px; }
        .picker-count { font-size: 11px; color: var(--text-secondary); padding: 4px 20px 8px; flex-shrink: 0; }
        .picker-scene-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
        .picker-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); white-space: nowrap; }

        /* ── Edit-channel modal ───────────────────────────────────────────── */
        .logo-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,15,26,0.85); z-index: 9999; justify-content: center; align-items: flex-start; backdrop-filter: blur(4px); padding: 24px 16px; box-sizing: border-box; overflow-y: auto; }
        .logo-modal-card { background: var(--bg-card); border-radius: 8px; padding: 28px; width: 100%; max-width: 540px; position: relative; margin: auto; }
