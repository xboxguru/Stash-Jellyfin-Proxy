    <script>
        const state = {
            config: {},
            logs: [],
            streams: [],
            currentPage: 'dashboard'
        };

        const DEFAULTS = {
            STASH_URL: '', STASH_API_KEY: '', SYNC_LEVEL: 'Everything',
            STASH_GRAPHQL_PATH: '/graphql', STASH_VERIFY_TLS: false,
            PROXY_BIND: '0.0.0.0', HOST_IP: '', PROXY_PORT: 8096, UI_PORT: 8097,
            SJS_USER: '', SJS_PASSWORD: '', SERVER_ID: '', SERVER_NAME: 'Stash Media Server',
            RECENT_DAYS: 14, FAVORITE_ACTION: 'o_counter', ALLOW_CLIENT_DELETION: 'Disabled',
            TAG_GROUPS: [], LATEST_GROUPS: ['Scenes'], STASH_TIMEOUT: 30, STASH_RETRIES: 3,
            ENABLE_FILTERS: true, ENABLE_TAG_FILTERS: false, ENABLE_ALL_TAGS: false,
            REQUIRE_AUTH_FOR_CONFIG: false, DEFAULT_PAGE_SIZE: 50, MAX_PAGE_SIZE: 200,
            LOG_LEVEL: 'INFO', LOG_DIR: '/config', LOG_FILE: 'stash_jellyfin_proxy.log',
            LOG_MAX_SIZE_MB: 10, LOG_BACKUP_COUNT: 3, BAN_THRESHOLD: 10, BAN_WINDOW_MINUTES: 15,
            BANNED_IPS: '', AUTHENTICATED_IPS: '', CACHE_VERSION: 0,
            TOP_PLAYED_RETENTION_DAYS: 0, AUTH_IP_TIMEOUT_MINUTES: 60,
            TRUST_PROXY_HEADERS: false, TRUSTED_PROXY_IPS: '', CORS_ALLOWED_ORIGINS: '',
            CLIENT_LOG_MAX_BYTES: 1048576, UI_PUBLIC_STATUS_ENDPOINT: false, UI_ALLOWED_IPS: '',
            UI_CSRF_PROTECTION: true, AUTH_RATE_LIMIT_WINDOW_MINUTES: 15, AUTH_RATE_LIMIT_MAX_ATTEMPTS: 10,
            ENABLE_LIVE_TV: false, ENABLE_TUNARR: false, TUNER_M3U_URL: '', TUNER_XMLTV_URL: '',
            ENABLE_STASH_CHANNELS: false,
            STASH_SCHEDULE_DAYS: 7, STASH_KEEP_DAYS: 2, STASH_CHANNEL_START_NUMBER: 5001,
            ENABLE_SHORTS_CHANNEL: false, SHORTS_MAX_MINUTES: 5,
            FFMPEG_PATH: 'ffmpeg', LIVE_TV_IDLE_TIMEOUT: 60
        };

        let topPlayedData = [];
        let topPlayedLimit = 10;

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function formatDuration(seconds) {
            if (!seconds || seconds < 0) return '';
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (d > 0) return `${d}d ${h}h ${m}m`;
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                if(page) showPage(page);
            });
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                topPlayedLimit = parseInt(e.target.dataset.limit);
                renderTopPlayed();
            });
        });

        async function showPage(page) {
            state.currentPage = page;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${page}`)?.classList.remove('hidden');

            if (page === 'config') fetchConfig();
            else if (page === 'logs') fetchLogs();
            else if (page === 'guide') loadGuide();
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('proxy-status').textContent = data.running ? 'Running' : 'Stopped';
                document.getElementById('proxy-status').className = 'status-value ' + (data.running ? 'running' : 'stopped');
                document.getElementById('stash-status').textContent = data.stashConnected ? 'Connected' : 'Disconnected';
                document.getElementById('stash-status').className = 'status-value ' + (data.stashConnected ? 'connected' : 'disconnected');
                document.getElementById('stash-version').textContent = data.stashVersion || '-';
                document.getElementById('proxy-uptime').textContent = data.uptime ? `Uptime: ${formatDuration(data.uptime)}` : '';
            } catch (e) {}
        }

        async function fetchStreams() {
            try {
                const res = await fetch('/api/streams');
                const data = await res.json();
                state.streams = data.streams || [];
                document.getElementById('stream-count').textContent = state.streams.length;
                const list = document.getElementById('streams-list');
                if (state.streams.length === 0) {
                    list.innerHTML = '<div class="empty-state">No active streams</div>';
                } else {
                    list.innerHTML = state.streams.map(s => `
                        <div class="stream-item">
                            ${s.item_id ? `<img class="stream-thumb" src="/Items/${s.item_id}/Images/Primary" onerror="this.style.display='none'">` : ''}
                            <div class="stream-details">
                                <div class="stream-title" title="${escapeHTML(s.title || s.id)}">${escapeHTML(s.performer && s.performer !== 'Unknown' ? s.performer + ': ' : '')}${escapeHTML(s.title || s.id)}</div>
                                <div class="stream-meta">
                                    <span class="stream-meta-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>${escapeHTML(s.user || 'unknown')}</span>
                                    <span class="stream-meta-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>${escapeHTML(s.clientIp || 'unknown')}</span>
                                    <span class="stream-meta-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>${escapeHTML(s.clientType || 'unknown')}</span>
                                </div>
                            </div>
                            <div class="stream-time">${s.started ? formatDuration(Date.now()/1000 - s.started) : ''}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        function renderTopPlayed() {
            const topList = document.getElementById('top-played-list');
            const tabsContainer = document.getElementById('top-played-tabs');
            const tab50 = document.querySelector('.tab-btn[data-limit="50"]');
            const tab100 = document.querySelector('.tab-btn[data-limit="100"]');
            
            if (topPlayedData.length > 10) {
                tabsContainer.style.display = 'flex';
                tab50.style.display = topPlayedData.length > 10 ? 'block' : 'none';
                tab100.style.display = topPlayedData.length > 50 ? 'block' : 'none';
            } else {
                tabsContainer.style.display = 'none';
            }

            if (topPlayedData.length === 0) {
                topList.innerHTML = '<div class="empty-state">No play data yet</div>';
                return;
            }

            const itemsToShow = topPlayedData.slice(0, topPlayedLimit);
            topList.innerHTML = itemsToShow.map((item, idx) => `
                <div class="top-played-item">
                    <span class="top-played-rank">${idx + 1}</span>
                    <div class="top-played-info">
                        <div class="top-played-title" title="${escapeHTML(item.title)}">${escapeHTML(item.title)}</div>
                        <div class="top-played-performer">${escapeHTML(item.performer || 'Unknown')}</div>
                    </div>
                    <span class="top-played-count">${item.count}x</span>
                </div>
            `).join('');
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                if (data.stash) {
                    document.getElementById('stat-scenes').textContent = data.stash.scenes.toLocaleString();
                    document.getElementById('stat-performers').textContent = data.stash.performers.toLocaleString();
                    document.getElementById('stat-studios').textContent = data.stash.studios.toLocaleString();
                    document.getElementById('stat-tags').textContent = data.stash.tags.toLocaleString();
                    document.getElementById('stat-groups').textContent = data.stash.groups.toLocaleString();
                }
                if (data.proxy) {
                    document.getElementById('stat-streams-today').textContent = data.proxy.streams_today.toLocaleString();
                    document.getElementById('stat-total-streams').textContent = data.proxy.total_streams.toLocaleString();
                    document.getElementById('stat-unique-ips').textContent = data.proxy.unique_ips_today.toLocaleString();
                    document.getElementById('stat-auth-success').textContent = data.proxy.auth_success.toLocaleString();
                    document.getElementById('stat-auth-failed').textContent = data.proxy.auth_failed.toLocaleString();

                    topPlayedData = data.proxy.top_played || [];
                    renderTopPlayed();
                }
            } catch (e) {}
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs?limit=100');
                const data = await res.json();
                state.logs = data.entries || [];
                renderLogs();
            } catch (e) {}
        }

        function renderLogs() {
            const levelFilter = document.getElementById('log-level-filter').value;
            const searchFilter = document.getElementById('log-search').value.toLowerCase();
            let filtered = state.logs;
            if (levelFilter) filtered = filtered.filter(l => l.level === levelFilter);
            if (searchFilter) filtered = filtered.filter(l => l.message.toLowerCase().includes(searchFilter));
            
            document.getElementById('log-count').textContent = `${filtered.length} entries`;
            const html = filtered.map(l => `<div class="log-entry log-${l.level}">${l.timestamp} [${l.level}] ${escapeHTML(l.message)}</div>`).join('');
            document.getElementById('full-logs').innerHTML = html || '<div class="empty-state">No logs</div>';
            
            if (state.currentPage === 'dashboard') {
                const dashboardHtml = filtered.slice(-10).map(l => `<div class="log-entry log-${l.level}">${l.timestamp} [${l.level}] ${escapeHTML(l.message)}</div>`).join('');
                document.getElementById('dashboard-logs').innerHTML = dashboardHtml || '<div class="empty-state">No logs</div>';
            }
        }

        async function fetchConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                const config = data.config || data;
                const envFields = data.env_fields || [];
                const definedFields = data.defined_fields || [];
                
                const dynList = document.getElementById('dynamic-ips-list');
                if (dynList) {
                    const dynIps = data.dynamic_ips || {};
                    if (Object.keys(dynIps).length === 0) {
                        dynList.style.display = 'block';
                        dynList.innerHTML = '<span style="color: var(--text-secondary);">No active dynamic IPs</span>';
                    } else {
                        const timeoutMins = config.AUTH_IP_TIMEOUT_MINUTES || 60;
                        dynList.style.display = 'flex';
                        dynList.style.flexWrap = 'wrap';
                        dynList.style.gap = '8px';
                        
                        dynList.innerHTML = Object.entries(dynIps).map(([ip, ts]) => {
                            const minutesLeft = Math.max(0, Math.round((timeoutMins * 60 - (Date.now() / 1000 - ts)) / 60));
                            return `<div style="display: inline-flex; align-items: center; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 16px; padding: 2px 8px 2px 10px; font-size: 13px;">
                                <span>${ip} <span style="color:var(--text-secondary); font-size:11px; margin-left: 2px;">(~${minutesLeft}m)</span></span>
                                <button type="button" onclick="pruneDynamicIp('${ip}')" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size: 12px; margin-left: 8px; padding: 2px; display: flex; align-items: center; justify-content: center; transition: color 0.2s;" onmouseover="this.style.color='var(--error)'" onmouseout="this.style.color='var(--text-secondary)'" title="Remove IP">✕</button>
                            </div>`;
                        }).join('');
                    }
                }
                const envNotice = document.getElementById('env-notice');
                if (envFields.length > 0) {
                    envNotice.style.display = 'block';
                    envNotice.querySelector('span').textContent = envFields.join(', ');
                } else envNotice.style.display = 'none';

                Object.entries(config).forEach(([key, value]) => {
                    const input = document.querySelector(`[name="${key}"]`);
                    if (input) {
                        const isEnv = envFields.includes(key);
                        const isDefined = definedFields.includes(key);
                        
                        if (isEnv) {
                            if (input.type === 'checkbox') {
                                input.disabled = true;
                                input.closest('label')?.classList.add('env-locked-label');
                            } else {
                                input.readOnly = true;
                                input.disabled = input.tagName === 'SELECT';
                                input.classList.add('env-locked');
                            }
                        }

                        if (input.type === 'checkbox') input.checked = value === true || value === 'true';
                        else if (input.tagName === 'SELECT') input.value = value;
                        else if (Array.isArray(value)) {
                            const valStr = value.join(', ');
                            const defStr = Array.isArray(DEFAULTS[key]) ? DEFAULTS[key].join(', ') : '';
                            input.value = (valStr !== defStr || isDefined) ? valStr : '';
                        } else {
                            const strVal = String(value);
                            const strDef = String(DEFAULTS[key] ?? '');
                            input.value = (strVal !== strDef || isDefined) ? value : '';
                        }
                    }
                });
                if (document.getElementById('current-cache-version')) document.getElementById('current-cache-version').innerText = 'v' + (config.CACHE_VERSION || 0);
            } catch (e) {}
        }
        
        async function refreshDynamicConfigUI() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                const config = data.config || data;

                const bannedInput = document.querySelector('[name="BANNED_IPS"]');
                if (bannedInput && document.activeElement !== bannedInput) {
                    const valStr = Array.isArray(config.BANNED_IPS) ? config.BANNED_IPS.join(', ') : (config.BANNED_IPS || '');
                    if (bannedInput.value !== valStr) {
                        bannedInput.value = valStr;
                    }
                }

                const dynList = document.getElementById('dynamic-ips-list');
                if (dynList) {
                    const dynIps = data.dynamic_ips || {};
                    if (Object.keys(dynIps).length === 0) {
                        dynList.style.display = 'block';
                        dynList.innerHTML = '<span style="color: var(--text-secondary);">No active dynamic IPs</span>';
                    } else {
                        const timeoutMins = config.AUTH_IP_TIMEOUT_MINUTES || 60;
                        dynList.style.display = 'flex';
                        dynList.style.flexWrap = 'wrap';
                        dynList.style.gap = '8px';
                        
                        dynList.innerHTML = Object.entries(dynIps).map(([ip, ts]) => {
                            const minutesLeft = Math.max(0, Math.round((timeoutMins * 60 - (Date.now() / 1000 - ts)) / 60));
                            return `<div style="display: inline-flex; align-items: center; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 16px; padding: 2px 8px 2px 10px; font-size: 13px;">
                                <span>${ip} <span style="color:var(--text-secondary); font-size:11px; margin-left: 2px;">(~${minutesLeft}m)</span></span>
                                <button type="button" onclick="pruneDynamicIp('${ip}')" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size: 12px; margin-left: 8px; padding: 2px; display: flex; align-items: center; justify-content: center; transition: color 0.2s;" onmouseover="this.style.color='var(--error)'" onmouseout="this.style.color='var(--text-secondary)'" title="Remove IP">✕</button>
                            </div>`;
                        }).join('');
                    }
                }
            } catch (e) { }
        }

        async function pruneDynamicIp(ip) {
            try {
                await fetch(`/api/auth/dynamic_ips/${ip}`, { method: 'DELETE' });
                fetchConfig();
            } catch (e) {
                showToast('Failed to prune IP', 'error');
            }
        }

        async function doLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            if (res.ok) {
                document.getElementById('login-overlay').style.display = 'none';
                startDashboard();
            } else document.getElementById('login-error').style.display = 'block';
        }

        async function doLogout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.reload();
        }

        async function clearLogsUI() {
            try {
                await fetch('/api/logs/clear', { method: 'POST' });
                showToast('Log view cleared', 'success');
                fetchLogs();
            } catch (e) { showToast('Failed to clear logs', 'error'); }
        }

        function promptResetStats(btn) {
            if (btn.dataset.confirming === "true") {
                btn.dataset.confirming = "false";
                btn.innerHTML = "Reset Stats";
                btn.style.backgroundColor = "";
                btn.style.color = "";
                fetch('/api/stats/reset', { method: 'POST' }).then(() => fetchStats());
            } else {
                btn.dataset.confirming = "true";
                btn.innerHTML = "Are you sure?";
                btn.style.backgroundColor = "var(--error)";
                btn.style.color = "white";
                setTimeout(() => {
                    if (btn.dataset.confirming === "true") {
                        btn.dataset.confirming = "false";
                        btn.innerHTML = "Reset Stats";
                        btn.style.backgroundColor = "";
                        btn.style.color = "";
                    }
                }, 3000);
            }
        }

        function openQC() {
            document.getElementById('qc-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('qc-code').focus(), 100);
        }

        function closeQC() {
            document.getElementById('qc-overlay').style.display = 'none';
            document.getElementById('qc-code').value = '';
            document.getElementById('qc-status').textContent = '';
        }

        async function doQCAuthorize() {
            const code = document.getElementById('qc-code').value.trim();
            const statusEl = document.getElementById('qc-status');
            
            if (code.length < 5) {
                statusEl.textContent = 'Please enter a valid code.';
                statusEl.style.color = 'var(--warning)';
                return;
            }
            
            statusEl.textContent = 'Authorizing...';
            statusEl.style.color = 'var(--text-secondary)';

            try {
                const res = await fetch(`/api/quickconnect/authorize?code=${code}`, { method: 'POST' });
                const data = await res.json();
                
                if (res.ok && data.Success) {
                    statusEl.textContent = 'Device Authorized Successfully!';
                    statusEl.style.color = 'var(--success)';
                    setTimeout(closeQC, 2000);
                } else {
                    statusEl.textContent = data.Error || 'Authorization failed.';
                    statusEl.style.color = 'var(--error)';
                }
            } catch (e) {
                statusEl.textContent = 'Network error.';
                statusEl.style.color = 'var(--error)';
            }
        }

        async function startDashboard() {
            fetchStatus(); fetchStreams(); fetchLogs(); fetchStats(); fetchConfig();
            
            if (!window.pollInterval) {
                let isPolling = false;
                window.pollInterval = setInterval(async () => {
                    if (isPolling) return;
                    isPolling = true;
                    try {
                        if (state.currentPage === 'dashboard') {
                            await Promise.all([fetchStatus(), fetchStreams(), fetchLogs(), fetchStats()]);
                        } else if (state.currentPage === 'logs') {
                            await fetchLogs();
                        } else if (state.currentPage === 'config') {
                            await refreshDynamicConfigUI(); 
                        }
                    } finally {
                        isPolling = false;
                    }
                }, 5000);
            }
        }

        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            
            formData.forEach((value, key) => {
                if (key === 'TAG_GROUPS' || key === 'LATEST_GROUPS' || key === 'AUTHENTICATED_IPS' || key === 'UI_ALLOWED_IPS' || key === 'TRUSTED_PROXY_IPS' || key === 'CORS_ALLOWED_ORIGINS') {
                    data[key] = value.split(',').map(s => s.trim()).filter(Boolean);
                } else if (typeof DEFAULTS[key] === 'number') {
                    data[key] = value.trim() === '' ? DEFAULTS[key] : parseInt(value);
                } else data[key] = value.trim() === '' ? DEFAULTS[key] : value;
            });

            document.querySelectorAll('input[type="checkbox"]').forEach(cb => data[cb.name] = cb.checked);

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    const result = await res.json();
                    showToast(result.needs_restart ? 'Saved. Restart required for some changes.' : 'Configuration saved.', 'success');
                    fetchConfig();
                    const shouldShowGuide = !!(data.ENABLE_LIVE_TV && (data.ENABLE_TUNARR || data.ENABLE_STASH_CHANNELS));
                    const guideNav = document.getElementById('guide-nav-item');
                    if (guideNav) guideNav.style.display = shouldShowGuide ? '' : 'none';
                }
            } catch (e) { showToast('Failed to save', 'error'); }
        });

        document.getElementById('btn-increment-version').addEventListener('click', async () => {
            if(!confirm('Invalidate all Etags and URLs? Clients will rebuild caches on next sync.')) return;
            try {
                const response = await fetch('/api/cache/increment', { method: 'POST' });
                const data = await response.json();
                if (response.ok) { showToast(data.message || 'Cache Version incremented.', 'success'); fetchConfig(); }
                else showToast('Failed: ' + data.error, 'error');
            } catch (error) { showToast('Error incrementing cache.', 'error'); }
        });

        document.getElementById('btn-rotate-key').addEventListener('click', () => {
            if (confirm('Rotate API Key? This breaks existing client connections.')) {
                document.getElementById('PROXY_API_KEY').value = crypto.randomUUID();
                showToast('Key generated. Click Save to apply.', 'info');
            }
        });

        document.getElementById('restart-btn').addEventListener('click', async () => {
            if (confirm('Restart server?')) {
                await fetch('/api/restart', { method: 'POST' });
                showToast('Restarting...', 'info');
                setTimeout(() => location.reload(), 3000);
            }
        });

        const rebuildBtn = document.getElementById('btn-rebuild-schedule');
        if (rebuildBtn) {
            rebuildBtn.addEventListener('click', async () => {
                if (!confirm('Wipe and regenerate the Stash EPG schedule? This may take a few seconds.')) return;
                rebuildBtn.disabled = true;
                rebuildBtn.textContent = 'Rebuilding…';
                try {
                    const res = await fetch('/api/livetv/rebuild-schedule', { method: 'POST' });
                    const data = await res.json();
                    if (res.ok) showToast(`Schedule rebuilt: ${data.channels} channels, ${data.programs} entries.`, 'success');
                    else showToast('Rebuild failed: ' + (data.error || res.status), 'error');
                } catch (err) {
                    showToast('Error: ' + err.message, 'error');
                } finally {
                    rebuildBtn.disabled = false;
                    rebuildBtn.textContent = 'Regenerate Schedule';
                }
            });
        }

        (async () => {
            const res = await fetch('/api/auth/check');
            if (res.status === 401) document.getElementById('login-overlay').style.display = 'flex';
            else startDashboard();
        })();

        // Collapsible UI Logic
        function toggleResources() {
            const content = document.getElementById('resource-content');
            const toggle = document.getElementById('resource-toggle');
            content.classList.toggle('hidden');
            toggle.classList.toggle('collapsed');
        }

        // Color coding for stress levels
        function getStressColor(percent, isProxy = false) {
            if (percent > 90) return '#ef4444'; // Red danger
            if (percent > 75) return '#f59e0b'; // Amber warning
            return isProxy ? 'var(--primary)' : '#10b981'; // Default normal
        }

        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${h}h ${m}m`;
        }

        // Fetch loop
        async function fetchSysInfo() {
            // Don't waste network calls if the card is collapsed
            if (document.getElementById('resource-content').classList.contains('hidden')) return;

            try {
                const res = await fetch('/api/sysinfo');
                const data = await res.json();

                // Proxy Data
                document.getElementById('res-proxy-cpu').textContent = data.proxy.cpu_percent + '%';
                const pCpuBar = document.getElementById('bar-proxy-cpu');
                pCpuBar.style.width = Math.min(data.proxy.cpu_percent, 100) + '%';
                pCpuBar.style.backgroundColor = getStressColor(data.proxy.cpu_percent, true);

                document.getElementById('res-proxy-ram').textContent = data.proxy.ram_used_mb + ' MB';
                // Estimate proxy visual bar relative to total system RAM (capped at 100)
                const proxyRamPercent = (data.proxy.ram_used_mb / data.system.ram_total_mb) * 100;
                document.getElementById('bar-proxy-ram').style.width = Math.min(proxyRamPercent, 100) + '%';
                
                document.getElementById('res-proxy-uptime').textContent = formatUptime(data.proxy.uptime_sec);

                // System Data
                document.getElementById('res-sys-cpu').textContent = data.system.cpu_percent + '%';
                const sCpuBar = document.getElementById('bar-sys-cpu');
                sCpuBar.style.width = data.system.cpu_percent + '%';
                sCpuBar.style.backgroundColor = getStressColor(data.system.cpu_percent);

                document.getElementById('res-sys-ram').textContent = data.system.ram_percent + '%';
                document.getElementById('text-sys-ram').textContent = `${data.system.ram_used_mb} / ${data.system.ram_total_mb} MB`;
                const sRamBar = document.getElementById('bar-sys-ram');
                sRamBar.style.width = data.system.ram_percent + '%';
                sRamBar.style.backgroundColor = getStressColor(data.system.ram_percent);

                document.getElementById('res-sys-disk').textContent = data.system.disk_percent + '%';
                document.getElementById('bar-sys-disk').style.width = data.system.disk_percent + '%';

            } catch (e) {
                console.warn('Failed to fetch system info');
            }
        }

        // Add to your existing window.onload or initialize sequence:
        setInterval(fetchSysInfo, 3000); // Update every 3 seconds
        fetchSysInfo(); // Run immediately on load

        // ── TV Guide ──────────────────────────────────────────────────────────

        const GUIDE_PX_PER_MIN = 5;     // 300px per hour
        const GUIDE_CH_COL_W   = 160;   // channel column width in px
        const GENRE_CLASS = {
            'Movie':'gp-movie','Kids':'gp-kids','Sports':'gp-sports','Comedy':'gp-comedy',
            'Documentary':'gp-documentary','Talk':'gp-talk','Music':'gp-music','News':'gp-news'
        };

        let _guideDate = null;          // midnight LOCAL time of displayed day (Date object)
        let _guideData = null;          // last loaded response
        let _epgModalToken = 0;         // incremented on each openEpgModal to cancel stale responses
        let _logoModalTvgId = null;
        let _guideEditMode = false;
        let _pickerTvgId = null;
        let _pickerAfterEid = null;
        let _channelScenesCache = {};
        let _dragData = null;
        let _dragCurrentShiftLeft = -1;
        let _dragInsertAfterEid = null;
        let _chEditTvgId = null;
        let _chEditType = 'tag';
        let _chEditSources = [];
        let _chEditStashArtTagId = null;
        let _chAddType = 'tag';
        let _chAddSources = [];
        let _tagsCache = null;
        let _filtersCache = null;
        let _chDragSrc = null;

        function _guideDateMidnightLocal(d) {
            // Return a new Date at 00:00:00 in the browser's local timezone.
            const r = new Date(d);
            r.setHours(0, 0, 0, 0);
            return r;
        }

        function _guideDateLabel(d) {
            // Human-readable label using local timezone.
            return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function _guideFormatHour(h) {
            if (h === 0)  return '12 AM';
            if (h < 12)   return `${h} AM`;
            if (h === 12) return '12 PM';
            return `${h - 12} PM`;
        }

        async function loadGuide() {
            if (!_guideDate) {
                _guideDate = _guideDateMidnightLocal(new Date());
            }

            const todayLocal = _guideDateMidnightLocal(new Date());
            const isToday    = _guideDate.getTime() === todayLocal.getTime();

            document.getElementById('guide-date-label').textContent =
                isToday ? `Today — ${_guideDateLabel(_guideDate)}` : _guideDateLabel(_guideDate);

            document.getElementById('guide-loading').classList.remove('hidden');
            document.getElementById('guide-empty').classList.add('hidden');
            document.getElementById('guide-wrapper').innerHTML = '';

            // Send local midnight as a Unix timestamp so the backend uses the same
            // day boundary as the user's clock, not UTC midnight.
            const dayTs = Math.floor(_guideDate.getTime() / 1000);
            try {
                const res = await fetch(`/api/livetv/guide?ts=${dayTs}`);
                _guideData = await res.json();
            } catch (e) {
                document.getElementById('guide-loading').classList.add('hidden');
                document.getElementById('guide-empty').textContent = 'Failed to load guide data.';
                document.getElementById('guide-empty').classList.remove('hidden');
                return;
            }

            document.getElementById('guide-loading').classList.add('hidden');

            if (!_guideData.channels || _guideData.channels.length === 0) {
                document.getElementById('guide-empty').classList.remove('hidden');
                return;
            }

            renderGuide(isToday);
        }

        function renderGuide(isToday) {
            const wrapper   = document.getElementById('guide-wrapper');
            const channels  = _guideData.channels;
            const dayStart  = _guideData.day_start;
            const totalMins = 24 * 60;
            const totalW    = totalMins * GUIDE_PX_PER_MIN;   // 7200 px
            const nowSec    = Date.now() / 1000;
            const ROW_H     = 80;
            const RULER_H   = 36;

            // ── Left panel: channel column ────────────────────────────────────
            // Fixed width, overflow:hidden — JS syncs its scrollTop from the right panel.
            const sortedChannels = [...channels].sort((a, b) => (Number(a.number) || 0) - (Number(b.number) || 0));
            let leftHtml = `<div class="guide-corner" style="height:${RULER_H}px;"></div>`;
            for (const ch of sortedChannels) {
                const logoHtml = ch.logo_url
                    ? `<img class="guide-ch-logo" src="${escapeHTML(ch.logo_url)}" alt="" onerror="this.style.display='none'">`
                    : `<div class="guide-ch-logo-placeholder"></div>`;
                if (ch.readonly) {
                    leftHtml += `<div class="guide-channel-cell guide-channel-readonly" style="height:${ROW_H}px;"
                        data-tvgid="${escapeHTML(ch.tvg_id)}" data-chname="${escapeHTML(ch.name)}">
                        ${logoHtml}
                        ${ch.number != null ? `<span class="guide-ch-number">${escapeHTML(String(ch.number))}</span>` : ''}
                        <span class="guide-ch-name">${escapeHTML(ch.name)}</span>
                        <span class="guide-ch-ext-badge">External</span>
                    </div>`;
                } else {
                    leftHtml += `<div class="guide-channel-cell" style="height:${ROW_H}px;"
                        data-tvgid="${escapeHTML(ch.tvg_id)}" data-chname="${escapeHTML(ch.name)}"
                        draggable="true"
                        onclick="openChannelEditModal(this)" title="Click to edit channel">
                        <span class="guide-ch-drag-handle">&#8942;</span>
                        ${logoHtml}
                        ${ch.number != null ? `<span class="guide-ch-number">${escapeHTML(String(ch.number))}</span>` : ''}
                        <span class="guide-ch-name">${escapeHTML(ch.name)}</span>
                        <span class="guide-ch-edit-hint">&#9998; Edit</span>
                    </div>`;
                }
            }
            leftHtml += `<div class="guide-add-channel-cell" onclick="openAddChannelModal()">&#43; Add Channel</div>`;

            // ── Right panel: ruler + program rows ─────────────────────────────
            // overflow:auto in both directions — this is the real scroll container.
            let rulerHtml = `<div class="guide-ruler" style="width:${totalW}px;position:relative;">`;
            for (let h = 0; h < 24; h++) {
                rulerHtml += `<div class="guide-hour-label" style="left:${h * 60 * GUIDE_PX_PER_MIN}px;">${_guideFormatHour(h)}</div>`;
            }
            if (isToday) {
                const nowLeft = Math.round(Math.min(totalMins, Math.max(0, (nowSec - dayStart) / 60)) * GUIDE_PX_PER_MIN);
                rulerHtml += `<div class="guide-now-line" style="left:${nowLeft}px;"></div>`;
            }
            rulerHtml += `</div>`;

            let rowsHtml = '';
            for (const ch of sortedChannels) {
                let progsHtml = '';
                let prevEid = null;
                let prevRightPx = 0;
                if (isToday) {
                    const nowLeft = Math.round(Math.min(totalMins, Math.max(0, (nowSec - dayStart) / 60)) * GUIDE_PX_PER_MIN);
                    progsHtml += `<div class="guide-now-line" style="left:${nowLeft}px;"></div>`;
                }
                const sortedProgs = [...(ch.programs || [])].sort((a, b) => a.start_ts - b.start_ts);
                let lastProgIsPast = true;
                for (const prog of sortedProgs) {
                    const startMin = (prog.start_ts - dayStart) / 60;
                    const stopMin  = (prog.stop_ts  - dayStart) / 60;
                    const s = Math.max(0, startMin);
                    const e = Math.min(totalMins, stopMin);
                    if (e <= s) continue;
                    let left  = Math.round(s * GUIDE_PX_PER_MIN);
                    // 14 = the smallest width .guide-program can actually render at:
                    // box-sizing:border-box + 1px border ×2 + 6px padding ×2 (see head.html .guide-program).
                    // Recording a narrower width here would desync data-orig-width from the rendered box.
                    let width = Math.max(14, Math.round((e - s) * GUIDE_PX_PER_MIN) - 2);
                    // Push right if it would visually overlap the previous program
                    if (left < prevRightPx) {
                        const push = prevRightPx - left;
                        left += push;
                        width = Math.max(14, width - push);
                    }
                    const isLive = prog.start_ts <= nowSec && prog.stop_ts > nowSec;
                    const isPast = prog.stop_ts <= nowSec;
                    // Insert zone only before future programs on editable channels
                    if (!ch.readonly && prog.start_ts > nowSec) {
                        progsHtml += `<div class="guide-insert-zone" style="left:${left - 3}px;"
                            data-tvgid="${escapeHTML(ch.tvg_id)}" data-aftereid="${escapeHTML(prevEid || '')}"
                            onclick="openInsertModal(this)"><span class="guide-insert-icon">+</span></div>`;
                    }
                    // Use data-* so titles are never embedded in JS string literals:
                    // the browser decodes HTML entities (&#39; → ') before JS sees them.
                    const clickAttrs = prog.scene_id
                        ? ` data-scene="${prog.scene_id}" data-title="${escapeHTML(prog.title)}" onclick="openSceneModal(this)"`
                        : ch.readonly
                        ? ` data-epg-tvgid="${escapeHTML(ch.tvg_id)}" data-epg-start="${prog.start_ts}" onclick="openEpgModal(this)"`
                        : '';
                    const genreClass = GENRE_CLASS[prog.genre] || '';
                    const hasDrag = !ch.readonly && !!(prog.scene_id && prog.eid) && !isPast;
                    progsHtml += `<div class="guide-program${isLive ? ' guide-program-live' : ''}${isPast ? ' guide-program-past' : ''}${genreClass ? ' ' + genreClass : ''}"
                        style="left:${left}px;width:${width}px;"
                        data-eid="${escapeHTML(prog.eid || '')}"
                        data-tvgid="${escapeHTML(ch.tvg_id)}"
                        data-sceneid="${escapeHTML(prog.scene_id || '')}"
                        data-orig-left="${left}"
                        data-orig-width="${width}"
                        title="${escapeHTML(prog.title)}"
                        ${hasDrag ? 'draggable="true"' : ''}${clickAttrs}>
                        ${hasDrag ? '<span class="guide-prog-drag" title="Drag to reorder">&#8942;</span>' : ''}
                        ${(!ch.readonly && prog.eid && !isPast) ? `<button class="guide-prog-delete" data-eid="${escapeHTML(prog.eid)}" data-tvgid="${escapeHTML(ch.tvg_id)}" onclick="event.stopPropagation();deleteScheduleEntry(this.dataset.tvgid,this.dataset.eid)" title="Remove from schedule">&#10005;</button>` : ''}
                        <span class="guide-program-title">${escapeHTML(prog.title)}</span>
                    </div>`;
                    lastProgIsPast = isPast;
                    prevEid = prog.eid || null;
                    prevRightPx = left + width + 2;
                }
                // Trailing insert zone after last visible program (editable channels only)
                if (!ch.readonly && prevEid && !lastProgIsPast) {
                    progsHtml += `<div class="guide-insert-zone" style="left:${prevRightPx - 3}px;"
                        data-tvgid="${escapeHTML(ch.tvg_id)}" data-aftereid="${escapeHTML(prevEid)}"
                        onclick="openInsertModal(this)"><span class="guide-insert-icon">+</span></div>`;
                }
                rowsHtml += `<div class="guide-programs-row" style="width:${totalW}px;height:${ROW_H}px;">${progsHtml}</div>`;
            }

            wrapper.innerHTML =
                `<div class="guide-left" id="guide-left">${leftHtml}</div>` +
                `<div class="guide-right" id="guide-right">${rulerHtml}${rowsHtml}</div>`;

            // Re-apply edit mode class after re-render
            wrapper.classList.toggle('guide-edit-active', _guideEditMode);

            // Insert zone hover: adjacent programs shrink to make visual room
            wrapper.querySelectorAll('.guide-insert-zone').forEach(zone => {
                zone.addEventListener('mouseenter', () => {
                    if (_dragData) return;
                    const row = zone.closest('.guide-programs-row');
                    if (!row) return;
                    const zonePx = parseInt(zone.style.left); // DOM left (before transform)
                    // Hover CSS: width:30px, transform:translateX(-15px)
                    // Visual left  = zonePx - 15  →  clear target with 2px margin = zonePx - 17
                    // Visual right = zonePx + 15  →  clear target with 2px margin = zonePx + 17
                    const progs = Array.from(row.querySelectorAll('.guide-program[data-orig-left]'));
                    const sorted = progs.slice().sort((a, b) => parseInt(a.dataset.origLeft) - parseInt(b.dataset.origLeft));
                    // zone.style.left = right_prog_left - 3, so right_prog_left = zonePx + 3.
                    // Filters are mutually exclusive: a program can only satisfy both if origWidth=0 (impossible).
                    // Using origRight <= zonePx+3 captures programs clamped to 0px gap (no gap to rightProg).
                    const leftProgs  = sorted.filter(p => parseInt(p.dataset.origLeft) + parseInt(p.dataset.origWidth) <= zonePx + 3).reverse();
                    const rightProgs = sorted.filter(p => parseInt(p.dataset.origLeft) >= zonePx + 3);
                    // Smallest width .guide-program can actually render at: box-sizing:border-box
                    // means width includes 1px border ×2 + 6px padding ×2 = 14px floor (see head.html).
                    // The browser clamps narrower inline widths to this, so canShrink must use 14, not 4 —
                    // otherwise the absorber is picked thinking it can shrink more than it physically can.
                    const MIN_W = 14;

                    // Pixels each side must yield for the expanded zone (visual [zonePx-15, zonePx+15])
                    // to have 2px clearance at each boundary.
                    const leftNeed  = leftProgs.length  > 0 ? Math.max(0, (parseInt(leftProgs[0].dataset.origLeft)  + parseInt(leftProgs[0].dataset.origWidth))  - (zonePx - 17)) : 0;
                    const rightNeed = rightProgs.length > 0 ? Math.max(0, (zonePx + 17) - parseInt(rightProgs[0].dataset.origLeft)) : 0;

                    // Absorber strategy: walk outward from the zone until we find the first program
                    // with enough spare capacity to absorb the full amount in one shot.
                    // Smaller programs between the zone and the absorber just slide as a block.
                    // The absorber itself shrinks; everything past it is untouched.
                    const applyAbsorber = (progs, need, direction) => {
                        if (need <= 0 || progs.length === 0) return;
                        // Find first program that can absorb the full amount
                        let absIdx = progs.length - 1; // fallback: last program absorbs what it can
                        for (let i = 0; i < progs.length; i++) {
                            if (Math.max(0, parseInt(progs[i].dataset.origWidth) - MIN_W) >= need) {
                                absIdx = i;
                                break;
                            }
                        }
                        const abs    = progs[absIdx];
                        const absL   = parseInt(abs.dataset.origLeft);
                        const absW   = parseInt(abs.dataset.origWidth);
                        // shrink = how much the absorber's near edge actually moves.
                        // Non-absorbers must slide by the same amount so inter-program gaps are preserved.
                        // Using 'need' for non-absorbers when the absorber can only yield 'shrink < need'
                        // would slide them into the absorber.
                        const shrink = Math.min(need, Math.max(0, absW - MIN_W));
                        for (let i = 0; i < absIdx; i++) {
                            const p = progs[i];
                            const origL = parseInt(p.dataset.origLeft);
                            p.style.transition = 'left 0.15s ease';
                            p.style.left = (origL + direction * shrink) + 'px';
                        }
                        // Absorber: shrink from near (zone-facing) edge; far edge stays anchored.
                        // Left: left edge anchors, right retreats → left stays, width shrinks.
                        // Right: right edge anchors, left retreats → left moves right by shrink, width shrinks.
                        abs.style.transition = 'left 0.15s ease, width 0.15s ease';
                        abs.style.left  = (direction > 0 ? absL + shrink : absL) + 'px';
                        abs.style.width = (absW - shrink) + 'px';
                    };

                    applyAbsorber(leftProgs,  leftNeed,  -1); // left side slides left  (direction -1)
                    applyAbsorber(rightProgs, rightNeed, +1); // right side slides right (direction +1)
                });
                zone.addEventListener('mouseleave', () => {
                    if (_dragData) return;
                    const row = zone.closest('.guide-programs-row');
                    if (!row) return;
                    row.querySelectorAll('.guide-program[data-orig-left]').forEach(p => {
                        p.style.transition = 'left 0.15s ease, width 0.15s ease';
                        p.style.left  = p.dataset.origLeft + 'px';
                        p.style.width = p.dataset.origWidth + 'px';
                        setTimeout(() => { p.style.transition = ''; }, 160);
                    });
                });
            });

            // Wire drag-and-drop with live visual shift
            wrapper.querySelectorAll('.guide-program[draggable="true"]').forEach(el => {
                el.addEventListener('dragstart', e => {
                    if (!_guideEditMode) { e.preventDefault(); return; }
                    _dragData = {
                        tvg_id: el.dataset.tvgid, eid: el.dataset.eid, scene_id: el.dataset.sceneid,
                        px_width: parseInt(el.dataset.origWidth)
                    };
                    el.classList.add('dragging');
                    wrapper.classList.add('guide-drag-active');
                    e.dataTransfer.effectAllowed = 'move';
                });
                el.addEventListener('dragend', () => {
                    el.classList.remove('dragging');
                    wrapper.classList.remove('guide-drag-active');
                    clearDragShifts();
                    _dragData = null;
                    _dragInsertAfterEid = null;
                });
                el.addEventListener('dragover', e => {
                    if (!_guideEditMode || !_dragData || el.dataset.eid === _dragData.eid) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const rect = el.getBoundingClientRect();
                    const isLeftHalf  = e.clientX < rect.left + rect.width / 2;
                    const elOrigLeft  = parseInt(el.dataset.origLeft);
                    const elOrigWidth = parseInt(el.dataset.origWidth);
                    const gapLeft = isLeftHalf ? elOrigLeft : elOrigLeft + elOrigWidth + 2;
                    if (gapLeft !== _dragCurrentShiftLeft) {
                        _dragCurrentShiftLeft = gapLeft;
                        _dragInsertAfterEid   = isLeftHalf ? _getPrevEid(el) : el.dataset.eid;
                        // Reset row positions, then apply new shift (no animation during rapid drag updates)
                        const row = el.closest('.guide-programs-row');
                        row.querySelectorAll('.guide-program[data-orig-left]').forEach(p => {
                            p.style.left = p.dataset.origLeft + 'px';
                        });
                        applyDragShift(row, gapLeft);
                    }
                });
                el.addEventListener('drop', e => {
                    e.preventDefault();
                    clearDragShifts();
                    if (!_dragData || !_guideEditMode) return;
                    const targetTvgId = el.dataset.tvgid;
                    if (_dragData.tvg_id !== targetTvgId || _dragData.eid === el.dataset.eid) {
                        _dragData = null;
                        return;
                    }
                    const afterEid = _dragInsertAfterEid;
                    const { eid: srcEid, scene_id } = _dragData;
                    _dragData = null;
                    _dragInsertAfterEid = null;
                    _dragCurrentShiftLeft = -1;
                    doReorderDrop(afterEid, srcEid, scene_id, targetTvgId);
                });
            });

            // Sync left panel vertical scroll to right panel's vertical scroll.
            const rightEl = document.getElementById('guide-right');
            const leftEl  = document.getElementById('guide-left');
            rightEl.addEventListener('scroll', () => { leftEl.scrollTop = rightEl.scrollTop; });

            // Wire channel cell drag-to-reorder (edit mode only)
            leftEl.querySelectorAll('.guide-channel-cell[draggable]').forEach(cell => {
                cell.addEventListener('dragstart', e => {
                    if (!_guideEditMode) { e.preventDefault(); return; }
                    _chDragSrc = cell.dataset.tvgid;
                    cell.classList.add('ch-dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                cell.addEventListener('dragend', () => {
                    cell.classList.remove('ch-dragging');
                    leftEl.querySelectorAll('.guide-channel-cell').forEach(c => c.classList.remove('ch-drag-over'));
                    _chDragSrc = null;
                });
                cell.addEventListener('dragover', e => {
                    if (!_guideEditMode || !_chDragSrc || cell.dataset.tvgid === _chDragSrc) return;
                    e.preventDefault();
                    leftEl.querySelectorAll('.guide-channel-cell').forEach(c => c.classList.remove('ch-drag-over'));
                    cell.classList.add('ch-drag-over');
                });
                cell.addEventListener('drop', e => {
                    e.preventDefault();
                    leftEl.querySelectorAll('.guide-channel-cell').forEach(c => c.classList.remove('ch-drag-over'));
                    if (!_chDragSrc || !_guideEditMode || cell.dataset.tvgid === _chDragSrc) return;
                    const srcId = _chDragSrc;
                    _chDragSrc = null;
                    reorderChannel(srcId, cell.dataset.tvgid);
                });
            });

            // Scroll to current time, roughly centred in a 4-hour viewport.
            if (isToday) {
                const nowMin  = Math.max(0, (nowSec - dayStart) / 60);
                rightEl.scrollLeft = Math.max(0, nowMin * GUIDE_PX_PER_MIN - 600);
            }
        }

        function guideShiftDay(delta) {
            if (!_guideDate) _guideDate = _guideDateMidnightLocal(new Date());
            // Add/subtract whole days and re-snap to local midnight (handles DST transitions).
            const next = new Date(_guideDate);
            next.setDate(next.getDate() + delta);
            _guideDate = _guideDateMidnightLocal(next);
            loadGuide();
        }

        function guideJumpToNow() {
            _guideDate = _guideDateMidnightLocal(new Date());
            loadGuide();
        }

        // ── Channel edit modal ────────────────────────────────────────────────

        async function openChannelEditModal(el) {
            const tvgId = el.dataset.tvgid;
            _chEditTvgId = tvgId;
            _logoModalTvgId = tvgId;
            _chEditSources = [];
            _chEditType = 'tag';
            _chEditStashArtTagId = null;

            document.getElementById('logo-modal-title').textContent = el.dataset.chname || 'Edit Channel';
            document.getElementById('ch-edit-name').value = '';
            document.getElementById('ch-edit-number').value = '';
            document.getElementById('ch-edit-source-search').value = '';
            document.getElementById('ch-edit-source-list').innerHTML = '<div class="empty-state" style="padding:12px;">Loading…</div>';
            document.getElementById('ch-edit-source-pills').innerHTML = '';
            document.getElementById('ch-regen-status').textContent = '';
            document.getElementById('logo-upload-status').textContent = '';
            document.getElementById('logo-file-input').value = '';
            const artSection = document.getElementById('ch-tag-art-section');
            if (artSection) artSection.style.display = 'none';
            const regenBtn = document.getElementById('ch-regen-btn');
            regenBtn.disabled = false;
            regenBtn.textContent = 'Regenerate Schedule for This Channel';
            const deleteBtn = document.getElementById('ch-delete-btn');
            if (deleteBtn) { deleteBtn.dataset.confirming = 'false'; deleteBtn.textContent = 'Delete Channel'; }

            const preview = document.getElementById('logo-modal-preview');
            const ch = (_guideData && _guideData.channels) ? _guideData.channels.find(c => c.tvg_id === tvgId) : null;
            if (ch && ch.logo_url) { preview.src = ch.logo_url; preview.style.display = 'block'; }
            else { preview.src = ''; preview.style.display = 'none'; }

            document.getElementById('logo-modal-overlay').style.display = 'flex';

            try {
                const res = await fetch('/api/livetv/channels-config');
                if (res.ok) {
                    const data = await res.json();
                    const cfg = (data.channels || []).find(c => c.tvg_id === tvgId);
                    if (cfg) {
                        document.getElementById('ch-edit-name').value = cfg.name || '';
                        document.getElementById('ch-edit-number').value = cfg.number != null ? cfg.number : '';
                        _chEditType = cfg.stash_type || 'tag';
                        _chEditSources = (cfg.source_ids || []).map(id => ({ id: String(id), name: String(id) }));
                    }
                }
            } catch (e) { /* proceed with empty state */ }

            _setChEditTab(_chEditType);
            await _loadChEditSources();
        }

                try {
                    const ur = await fetch(`/api/livetv/channel-logo/${encodeURIComponent(tvgId)}`, { method: 'POST', body: form });
                    if (!ur.ok) {
                        const ud = await ur.json().catch(() => ({}));

                        status.style.color = 'var(--error)';
                        return;
                    }
                } catch (e) {
                    status.textContent = 'Network error uploading art.';

                    return;

            } else if (_chEditStashArtTagId) {

                try {

                        headers: { 'Content-Type': 'application/json' },

                        const ad = await ar.json().catch(() => ({}));
                        status.textContent = ad.error || 'Failed to save tag art.';

                        return;

                    status.textContent = 'Network error saving tag art.';
                    status.style.color = 'var(--error)';
                    return;
                }

        // ── Channel reorder ───────────────────────────────────────────────────

        async function reorderChannel(srcId, targetId) {
            const cells = Array.from(document.querySelectorAll('#guide-left .guide-channel-cell[data-tvgid]'));
            const ordered = cells.map(c => c.dataset.tvgid);
            const srcIdx = ordered.indexOf(srcId);
            const tgtIdx = ordered.indexOf(targetId);
            if (srcIdx < 0 || tgtIdx < 0 || srcIdx === tgtIdx) return;
            // Always insert BEFORE the target (drop-into-gap model):
            // after removing src, target shifts left by 1 if src was above it.
            ordered.splice(srcIdx, 1);
            const insertIdx = srcIdx < tgtIdx ? tgtIdx - 1 : tgtIdx;
            ordered.splice(insertIdx, 0, srcId);
            try {
                const res = await fetch('/api/livetv/channels-config/reorder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order: ordered, src_id: srcId })
                });
                if (res.ok) loadGuide();
                else showToast('Reorder failed', 'error');
            } catch (e) { showToast('Network error', 'error'); }
        }

            const row = el.closest('.guide-programs-row');

            const elOrigLeft = parseInt(el.dataset.origLeft);
            let prevEid = null, prevLeft = -1;
            row.querySelectorAll('.guide-program[data-orig-left]:not(.dragging)').forEach(p => {

        function renderPickerScenes() {
            const listEl  = document.getElementById('picker-scene-list');
            const scenes  = _channelScenesCache[_pickerTvgId];
            if (!scenes) return;

            const titleQ  = document.getElementById('picker-filter-title').value.toLowerCase();
            const tagsQ   = document.getElementById('picker-filter-tags').value.toLowerCase();
            const onlyOrg = document.getElementById('picker-filter-organized').checked;
            const onlyEnj = document.getElementById('picker-filter-enjoyed').checked;

            let filtered = scenes;
            if (titleQ)  filtered = filtered.filter(s => (s.title || '').toLowerCase().includes(titleQ));
            if (tagsQ)   filtered = filtered.filter(s => (s.tags || []).some(t => t.toLowerCase().includes(tagsQ)));
            if (onlyOrg) filtered = filtered.filter(s => s.organized);
            if (onlyEnj) filtered = filtered.filter(s => (s.o_counter || 0) > 0);

            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="empty-state">No scenes match the filters.</div>';
                return;
            }

            const tvgEscaped = escapeHTML(_pickerTvgId);
            const eidEscaped = escapeHTML(_pickerAfterEid || '');
            listEl.innerHTML = filtered.map(s => {
                const dur      = formatDuration(s.duration_sec);
                const orgBadge = s.organized ? '<span class="picker-scene-badge picker-badge-org">Org</span>' : '';
                const enjBadge = (s.o_counter || 0) > 0 ? `<span class="picker-scene-badge picker-badge-enj">O&#215;${s.o_counter}</span>` : '';
                const idEscaped  = escapeHTML(s.id);
                const tagsHtml   = (s.tags || []).length > 0
                    ? `<div class="picker-scene-tags">${s.tags.map(t => `<span class="picker-tag">${escapeHTML(t)}</span>`).join('')}</div>`
                    : '';
                return `<div class="picker-scene-item"
                    data-tvgid="${tvgEscaped}" data-aftereid="${eidEscaped}" data-sceneid="${idEscaped}"
                    onclick="insertScene(this.dataset.tvgid,this.dataset.aftereid,this.dataset.sceneid)">
                    ${s.thumb ? `<img class="picker-scene-thumb" src="${escapeHTML(s.thumb)}" alt="" onerror="this.style.display='none'">` : '<div class="picker-thumb-placeholder"></div>'}
                    <div class="picker-scene-info">
                        <div class="picker-scene-title">${escapeHTML(s.title || 'Untitled')}</div>
                        <div class="picker-scene-meta">${escapeHTML(dur)}${orgBadge}${enjBadge}</div>
                        ${tagsHtml}
                    </div>
                </div>`;
            }).join('');
        }

            }
        }

        // ── Scene detail modal ────────────────────────────────────────────────

        async function openSceneModal(el) {
            const sceneId = el.dataset.scene;
            // dataset.title is the HTML-decoded value — browser converts &#39; → '
            // before we see it here, so apostrophes are already correct.
            const title = el.dataset.title || el.getAttribute('title') || '';

            const overlay = document.getElementById('scene-modal-overlay');
            overlay.style.display = 'flex';

            // Reset to loading state
            document.getElementById('scene-modal-title-el').textContent = title;
            document.getElementById('scene-modal-studio').textContent = '';
            document.getElementById('scene-modal-meta').textContent = 'Loading…';
            document.getElementById('scene-modal-stats').innerHTML = '';
            document.getElementById('scene-modal-desc').textContent = '';
            document.getElementById('scene-modal-performers').innerHTML = '';
            document.getElementById('scene-modal-tags').innerHTML = '';
            document.getElementById('scene-modal-performers-section').style.display = 'none';
            document.getElementById('scene-modal-tags-section').style.display = 'none';
            document.getElementById('scene-modal-desc-section').style.display = 'none';

            const poster = document.getElementById('scene-modal-poster');
            poster.style.display = 'block';
            poster.src = `/api/livetv/scene/${sceneId}/screenshot`;

            try {
                const res = await fetch(`/api/livetv/scene/${sceneId}`);
                const scene = await res.json();
                if (!res.ok) throw new Error(scene.error || res.status);

                document.getElementById('scene-modal-title-el').textContent = scene.title || title;
                document.getElementById('scene-modal-studio').textContent = scene.studio || '';

                // Meta row: date · runtime · rating · code
                const metaParts = [];
                if (scene.date) metaParts.push({ icon: '📅', text: scene.date });
                if (scene.duration) metaParts.push({ icon: '⏱', text: formatDuration(scene.duration) });
                if (scene.rating !== null && scene.rating !== undefined && scene.rating > 0) {
                    metaParts.push({ icon: '⭐', text: `${(scene.rating / 10).toFixed(1)} / 10` });
                }
                if (scene.code) metaParts.push({ icon: '#', text: scene.code });
                document.getElementById('scene-modal-meta').innerHTML = metaParts
                    .map(p => `<span class="scene-modal-meta-item"><span>${p.icon}</span><span>${escapeHTML(String(p.text))}</span></span>`)
                    .join('');

                // Stats row
                const statParts = [];
                if (scene.play_count > 0) statParts.push(`Plays: <span class="scene-modal-stat-val">${scene.play_count}</span>`);
                if (scene.o_counter > 0)  statParts.push(`O-Counter: <span class="scene-modal-stat-val">${scene.o_counter}</span>`);
                if (scene.organized)      statParts.push(`<span class="scene-modal-stat-val" style="color:var(--success)">✓ Organized</span>`);
                document.getElementById('scene-modal-stats').innerHTML = statParts.join('  ·  ');

                // Description
                if (scene.details) {
                    document.getElementById('scene-modal-desc').textContent = scene.details;
                    document.getElementById('scene-modal-desc-section').style.display = '';
                }

                // Performers
                if (scene.performers && scene.performers.length) {
                    document.getElementById('scene-modal-performers').innerHTML =
                        scene.performers.map(p => `<span class="scene-pill scene-pill-performer">${escapeHTML(p)}</span>`).join('');
                    document.getElementById('scene-modal-performers-section').style.display = '';
                }

                // Tags
                if (scene.tags && scene.tags.length) {
                    document.getElementById('scene-modal-tags').innerHTML =
                        scene.tags.map(t => `<span class="scene-pill">${escapeHTML(t)}</span>`).join('');
                    document.getElementById('scene-modal-tags-section').style.display = '';
                }

            } catch (e) {
                document.getElementById('scene-modal-meta').textContent = 'Failed to load scene details.';
            }
        }

        function closeSceneModal() {
            document.getElementById('scene-modal-overlay').style.display = 'none';
        }

        async function openEpgModal(el) {
            const token   = ++_epgModalToken;
            const tvgId   = el.dataset.epgTvgid;
            const startTs = parseInt(el.dataset.epgStart);
            const ch   = (_guideData.channels || []).find(c => c.tvg_id === tvgId);
            const prog = ch ? (ch.programs || []).find(p => p.start_ts === startTs) : null;

            document.getElementById('scene-modal-overlay').style.display = 'flex';

            // Phase 1: show available XMLTV data immediately (no network wait)
            _fillEpgModalFromXmltv(prog, el.getAttribute('title') || '');

            // Phase 2: try to match the scene in Stash for full metadata
            if (prog && prog.title) {
                try {
                    const params = new URLSearchParams({ title: prog.title });
                    if (prog.year) params.set('year', prog.year);
                    const res  = await fetch(`/api/livetv/epg-scene-match?${params}`);
                    const data = await res.json();
                    // Abort if user closed/changed modal while request was in flight
                    if (_epgModalToken !== token) return;
                    if (res.ok && data.match) _fillEpgModalFromScene(data);
                } catch (_) {}
            }
        }

        function _fillEpgModalFromXmltv(prog, fallbackTitle) {
            document.getElementById('scene-modal-title-el').textContent = prog ? prog.title : fallbackTitle;
            document.getElementById('scene-modal-studio').textContent   = '';
            document.getElementById('scene-modal-stats').innerHTML      = '';
            document.getElementById('scene-modal-performers-section').style.display = 'none';
            document.getElementById('scene-modal-tags-section').style.display      = 'none';
            document.getElementById('scene-modal-desc-section').style.display      = 'none';

            const poster = document.getElementById('scene-modal-poster');
            if (prog && prog.icon_url) {
                poster.style.display = 'block';
                poster.src = prog.icon_url;
            } else {
                poster.style.display = 'none';
            }

            const metaParts = [];
            if (prog && prog.year)   metaParts.push({ icon: '📅', text: prog.year });
            if (prog && prog.rating) metaParts.push({ icon: '🔞', text: prog.rating });
            if (prog) {
                const fmt = ts => new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                metaParts.push({ icon: '🕐', text: `${fmt(prog.start_ts)} – ${fmt(prog.stop_ts)}` });
            }
            document.getElementById('scene-modal-meta').innerHTML = metaParts
                .map(p => `<span class="scene-modal-meta-item"><span>${p.icon}</span><span>${escapeHTML(String(p.text))}</span></span>`)
                .join('');

            if (prog && prog.desc) {
                document.getElementById('scene-modal-desc').textContent = prog.desc;
                document.getElementById('scene-modal-desc-section').style.display = '';
            }
        }

        function _fillEpgModalFromScene(scene) {
            document.getElementById('scene-modal-title-el').textContent = scene.title || '';
            document.getElementById('scene-modal-studio').textContent   = scene.studio || '';

            const poster = document.getElementById('scene-modal-poster');
            poster.style.display = 'block';
            poster.src = `/api/livetv/scene/${scene.id}/screenshot`;

            const metaParts = [];
            if (scene.date) metaParts.push({ icon: '📅', text: scene.date });
            if (scene.rating !== null && scene.rating !== undefined && scene.rating > 0)
                metaParts.push({ icon: '⭐', text: `${(scene.rating / 10).toFixed(1)} / 10` });
            if (scene.code) metaParts.push({ icon: '#', text: scene.code });
            document.getElementById('scene-modal-meta').innerHTML = metaParts
                .map(p => `<span class="scene-modal-meta-item"><span>${p.icon}</span><span>${escapeHTML(String(p.text))}</span></span>`)
                .join('');

            const statParts = [];
            if (scene.play_count > 0) statParts.push(`Plays: <span class="scene-modal-stat-val">${scene.play_count}</span>`);
            if (scene.o_counter > 0)  statParts.push(`O-Counter: <span class="scene-modal-stat-val">${scene.o_counter}</span>`);
            if (scene.organized)      statParts.push(`<span class="scene-modal-stat-val" style="color:var(--success)">✓ Organized</span>`);
            document.getElementById('scene-modal-stats').innerHTML = statParts.join('  ·  ');

            if (scene.details) {
                document.getElementById('scene-modal-desc').textContent = scene.details;
                document.getElementById('scene-modal-desc-section').style.display = '';
            } else {
                document.getElementById('scene-modal-desc-section').style.display = 'none';
            }

            if (scene.performers && scene.performers.length) {
                document.getElementById('scene-modal-performers').innerHTML =
                    scene.performers.map(p => `<span class="scene-pill scene-pill-performer">${escapeHTML(p)}</span>`).join('');
                document.getElementById('scene-modal-performers-section').style.display = '';
            } else {
                document.getElementById('scene-modal-performers-section').style.display = 'none';
            }

            if (scene.tags && scene.tags.length) {
                document.getElementById('scene-modal-tags').innerHTML =
                    scene.tags.map(t => `<span class="scene-pill">${escapeHTML(t)}</span>`).join('');
                document.getElementById('scene-modal-tags-section').style.display = '';
            } else {
                document.getElementById('scene-modal-tags-section').style.display = 'none';
            }
        }

        // Close modals on Escape key
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeSceneModal();
                closeLogoModal();
                closeInsertModal();
                closeAddChannelModal();
            }
        });
    </script>
