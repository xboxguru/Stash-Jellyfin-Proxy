<div id="login-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
        <div class="card" style="width: 100%; max-width: 400px; padding: 30px;">
            <h2 style="margin-bottom: 20px; text-align: center; color: var(--accent);">Stash Proxy Login</h2>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-secondary);">Username</label>
                <input type="text" id="login-user" style="width: 100%; padding: 10px; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 4px;" placeholder="admin">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-secondary);">Password</label>
                <input type="password" id="login-pass" style="width: 100%; padding: 10px; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 4px;" onkeypress="if(event.key === 'Enter') doLogin()">
            </div>
            <button class="btn" style="width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;" onclick="doLogin()">Log In</button>
            <div id="login-error" style="color: var(--error); margin-top: 15px; text-align: center; display: none;">Invalid username or password.</div>
        </div>
    </div>

    <div id="qc-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,15,26,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(4px);">
        <div class="card" style="width: 100%; max-width: 400px; padding: 30px; text-align: center; position: relative;">
            <button onclick="closeQC()" style="position: absolute; top: 10px; right: 15px; background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer;">&times;</button>
            <h2 style="margin-bottom: 10px; color: var(--accent);">Quick Connect</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">Enter the 6-digit code displayed on your TV</p>
            <input type="text" id="qc-code" style="width: 200px; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border); color: var(--text-primary); border-radius: 8px; font-size: 24px; letter-spacing: 8px; text-align: center; font-weight: bold; margin-bottom: 20px;" maxlength="6" autocomplete="off" onkeypress="if(event.key === 'Enter') doQCAuthorize()">
            <button class="btn btn-primary" style="width: 100%; padding: 12px; font-weight: bold;" onclick="doQCAuthorize()">Authorize Device</button>
            <div id="qc-status" style="margin-top: 15px; font-weight: 500; font-size: 14px;"></div>
        </div>
    </div>
